riskPolicy:
  defaultLevel: execute-to-pr

  automationLevels:
    - name: l0-assist
      description: analyze only
      maxAutonomy: analysis-only

    - name: l1-controlled
      description: implement and validate
      maxAutonomy: execute-to-pr

  rules:
    - name: default-low-risk
      level: low
      match:
        paths:
          - "**/*"
      requires:
        humanApproval: false
        reviewAgents: 1
        mustRunCommands: []
      blockAutoMerge: false

